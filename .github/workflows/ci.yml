name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA (node24-runtime versions,
# resolved 2026-06-19). A mutable tag like @v7 can be silently retargeted;
# Dependabot bumps the SHAs (with the `# vN` comment) weekly.
jobs:
  test:
    name: node --test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Node 24 runs the TypeScript sources directly via native type-stripping;
      # the packages ship source (no build step), so this is the same code that
      # is published and certified.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install (workspace, reproducible)
        run: npm ci

      - name: Test
        run: npm test --workspaces --if-present

  playground:
    name: playground builds (browser bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install (workspace, reproducible)
        run: npm ci

      # Bundling the playground exercises @entviz/core + @entviz/react through a
      # real browser build (Vite). This is the teeth behind the isomorphic
      # guarantee — if a Node-only primitive ever creeps back into core, this
      # job fails, not just the static isomorphic.test.ts tripwire.
      - name: Build the playground
        run: npm run build -w @entviz/playground

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install (workspace, reproducible)
        run: npm ci

      # Fail the build on a known high/critical advisory in the dependency tree.
      # @entviz/core's only runtime dep is the audited, zero-transitive-dep
      # @noble/hashes; this also guards the dev/build tooling and React peer surface.
      - name: Audit dependencies
        run: npm audit --audit-level=high

  conformance:
    name: Tier-A conformance (full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The entviz reference repo carries the algorithm spec, SPEC_VERSION, the
      # golden conformance corpus, and the single authoritative Python runner
      # this package is certified against. PINNED to tag v0.14.0: that tag carries
      # the enhanced runner (--skip-file, external-impl invariant pairs, and the
      # spec-version-match assertion). NOTE: bumping this package's SPEC_VERSION
      # later REQUIRES bumping this pin in lockstep — the runner asserts the
      # corpus spec_version equals the impl's data-entviz-version and fails loudly
      # on a mismatch. Sparse-checkout only `compliance` (corpus + runner) and
      # `src` (the entviz package the runner imports for model extraction).
      - name: Check out the entviz reference (spec + corpus + runner)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          ref: v0.14.0
          path: entviz-ref
          sparse-checkout: |
            compliance
            src
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      # setup-python@v6.0.0 runs on the node24 runtime (verified: action.yml
      # `using: node24`).
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.x'

      # The conformance CLI (cli.ts -> entviz.ts) imports @entviz/core's one
      # runtime dependency (@noble/hashes), so node_modules must be installed.
      - name: Install (workspace, reproducible)
        run: npm ci

      - name: Install the Tier-A harness (lxml only; no rasterizer needed)
        run: pip install lxml

      # @entviz/core is now FULL conformance: every corpus vector must pass at
      # Tier A (render model) + error-rejection + invariant pairs. No --skip-file
      # and no --only subset. The runner's own spec-version-match assertion guards
      # corpus/impl agreement (replacing the former manual spec-drift wrapper).
      # Only trusted workspace paths are interpolated.
      - name: Tier-A conformance (full corpus, hard gate)
        run: |
          set -euo pipefail
          cd entviz-ref
          PYTHONPATH=src:. python -m compliance.runner \
            --impl-cmd "node ${GITHUB_WORKSPACE}/packages/core/src/cli.ts" --tiers A

  conformance-tier-b:
    name: Tier-B conformance (raster, full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Same pinned reference as the Tier-A job (see that job's note): tag
      # v0.14.0 carries the enhanced runner, and the pin must move with this
      # package's SPEC_VERSION.
      - name: Check out the entviz reference (spec + corpus + runner)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          ref: v0.14.0
          path: entviz-ref
          sparse-checkout: |
            compliance
            src
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.x'

      - name: Install (workspace, reproducible)
        run: npm ci

      # Tier B rasterizes the SVG and compares against the golden PNG, so the
      # harness additionally needs cairosvg + pillow (and the system Cairo lib).
      - name: Install the Tier-B harness (lxml + cairosvg + pillow)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcairo2
          pip install lxml "cairosvg==2.9.0" pillow numpy

      - name: Tier-B conformance (full corpus, hard gate)
        run: |
          set -euo pipefail
          cd entviz-ref
          PYTHONPATH=src:. python -m compliance.runner \
            --impl-cmd "node ${GITHUB_WORKSPACE}/packages/core/src/cli.ts" --tiers B
