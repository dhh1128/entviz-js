name: Release

# Publishes to npm when a vX.Y.Z tag is pushed (by scripts/release.py).
# The tag is the trigger; the script is the only supported way to create one.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # OIDC: lets npm exchange a short-lived token for publish
                    # rights (Trusted Publishing) and sign provenance. No
                    # long-lived NPM_TOKEN secret is used.

# Actions pinned by node24-runtime commit SHA (resolved 2026-06-19);
# Dependabot bumps the SHAs.
jobs:
  publish:
    name: verify + test + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; ensure it regardless of
      # which npm the Node 24 image happens to bundle.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install (reproducible)
        run: npm ci

      # The tag must match the version in the manifest, or we refuse to publish
      # something mislabeled. GITHUB_REF_NAME is the trusted tag ref, not user
      # input.
      - name: Verify tag matches @entviz/core version
        run: |
          set -euo pipefail
          manifest="$(node -p "require('./packages/core/package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=${tag} manifest=${manifest}"
          if [ "${tag}" != "${manifest}" ]; then
            echo "::error title=Version mismatch::tag v${tag} != @entviz/core ${manifest}"
            exit 1
          fi

      - name: Test
        run: npm test --workspaces --if-present

      # Publish via OIDC Trusted Publishing — no NODE_AUTH_TOKEN. npm verifies
      # the OIDC identity against the trusted publisher registered on
      # @entviz/core (this repo + this workflow file) and auto-attaches a
      # provenance attestation.
      #
      # Core only for now (chosen first-release scope). @entviz/react is held
      # back until proven; to publish it later, add (after core, which it
      # depends on):
      #   npm publish -w @entviz/react --provenance --access public
      # Its version already tracks core in lockstep via scripts/release.py, and
      # it would need its own trusted publisher registered on npm.
      - name: Publish @entviz/core to npm (OIDC, with provenance)
        run: npm publish -w @entviz/core --provenance --access public
