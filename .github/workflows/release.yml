name: Release

# Publishes to npm when a vX.Y.Z tag is pushed (by scripts/release.mjs).
# The tag is the trigger; the script is the only supported way to create one.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for npm publish --provenance

# Actions pinned by node24-runtime commit SHA (resolved 2026-06-19);
# Dependabot bumps the SHAs.
jobs:
  publish:
    name: verify + test + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install (reproducible)
        run: npm ci

      # The tag must match the version in the manifest, or we refuse to publish
      # something mislabeled. GITHUB_REF_NAME is the trusted tag ref, not user
      # input.
      - name: Verify tag matches @entviz/core version
        run: |
          set -euo pipefail
          manifest="$(node -p "require('./packages/core/package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=${tag} manifest=${manifest}"
          if [ "${tag}" != "${manifest}" ]; then
            echo "::error title=Version mismatch::tag v${tag} != @entviz/core ${manifest}"
            exit 1
          fi

      - name: Test
        run: npm test --workspaces --if-present

      # Core only for now (chosen first-release scope). @entviz/react is held
      # back until core is published and proven; to publish it later, add
      #   npm publish -w @entviz/react --provenance --access public
      # (after core, which it depends on) — its version already tracks core in
      # lockstep via scripts/release.mjs.
      - name: Publish @entviz/core to npm
        run: npm publish -w @entviz/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
