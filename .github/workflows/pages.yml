name: Deploy to GitHub Pages

# Publishes two things to https://dhh1128.github.io/entviz-js/ :
#   /        — the "try it live" playground (Vite build, base=/entviz-js/)
#   /api/    — the TypeDoc API reference for @entviz/core + @entviz/react
# Requires: repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Third-party actions are pinned by full commit SHA (node24-runtime versions,
# resolved 2026-07-09; matches ci.yml's policy). A mutable tag like @v6 can be
# silently retargeted; Dependabot bumps the SHAs (with the `# vN` comment) weekly.
permissions:
  pages: write
  id-token: write
  contents: read

# One in-flight Pages deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build _site (playground + TypeDoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24

      - name: Install (workspace, reproducible)
        run: npm ci

      # The project page lives under /entviz-js/, so the playground must be built
      # with that base path (asset URLs get the prefix). Local `npm run dev` keeps
      # the default base `/` — the base is a build-time flag, not a config change.
      - name: Build the playground (Pages base path)
        run: npm run build -w @entviz/playground -- --base=/entviz-js/

      # TypeDoc -> docs/api (self-contained HTML, relative links, .nojekyll).
      - name: Build the TypeDoc API reference
        run: npm run docs

      # Assemble the publish tree: playground at the root, API docs under /api/.
      - name: Assemble _site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/api
          cp -r apps/playground/dist/. _site/
          cp -r docs/api/. _site/api/
          test -f _site/index.html
          test -f _site/api/index.html

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
