name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-published CodeQL queries run against unchanged code.
    - cron: "27 4 * * 1"

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA (node24-runtime versions);
# Dependabot bumps the SHAs (with the `# vN` comment) weekly.
jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      # Required for CodeQL to upload results to the Security tab.
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: javascript-typescript
          # The packages ship TypeScript source and run via Node's native
          # type-stripping, so there is nothing to compile before analysis.
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          category: "/language:javascript-typescript"
