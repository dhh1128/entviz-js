name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-published CodeQL queries run against unchanged code.
    - cron: "27 4 * * 1"

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA (node24-runtime versions);
# Dependabot bumps the SHAs (with the `# vN` comment) weekly.
jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      # Required for CodeQL to upload results to the Security tab.
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: javascript-typescript
          # The packages ship TypeScript source and run via Node's native
          # type-stripping, so there is nothing to compile before analysis.
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          category: "/language:javascript-typescript"
